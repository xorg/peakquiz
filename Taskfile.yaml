version: "3"

tasks:
  run:
    desc: Run frontend and backend concurrently
    deps: [backend, frontend]

  backend:
    desc: Start the FastAPI dev server (http://localhost:8000)
    dir: backend
    cmd: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    desc: Start the Vite dev server (http://localhost:5173)
    dir: frontend
    cmd: npm run dev

  backend:install:
    desc: Install / sync backend dependencies
    dir: backend
    cmd: uv sync

  frontend:install:
    desc: Install frontend npm dependencies
    dir: frontend
    cmd: npm install

  install:
    desc: Install all dependencies (backend + frontend)
    deps: [backend:install, frontend:install]

  backend:lint:
    desc: Lint backend with ruff
    dir: backend
    cmd: uv run ruff check app/ tests/

  backend:lint:fix:
    desc: Lint backend and auto-fix safe issues
    dir: backend
    cmd: uv run ruff check --fix app/ tests/

  backend:typecheck:
    desc: Type-check backend with pyright
    dir: backend
    cmd: uv run pyright app/

  backend:check:
    desc: Run all backend checks (lint + typecheck)
    dir: backend
    deps: [backend:lint, backend:typecheck]

  frontend:build:
    desc: Build frontend for production
    dir: frontend
    cmd: npm run build
